# Neftel glioblastoma system configuration
# Cancer stem cell fate decision: 4 GBM meta-programs (MES, AC, OPC, NPC)
# GSE131928: Neftel et al. 2019 - Human glioblastoma Smart-seq2 + 10X scRNA-seq
# ~7,930 cells (Smart-seq2) from 28 patients; filter to malignant cells only

system:
  name: "neftel_gbm"
  condition_key: "tumor"
  conditions:
    MGH101: 0
    MGH102: 1
    MGH103: 2
    MGH104: 3
    MGH105: 4
    MGH106: 5
    MGH107: 6
    MGH108: 7
    MGH109: 8
    MGH110: 9
    MGH111: 10
