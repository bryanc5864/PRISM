      - "STMN2"
  sample_condition_map: {}
  root_cluster: "GBM_progenitor"
  cluster_key: "cluster"
  geo_accession: "GSE131928"
  download_function: "prism.data.download_neftel_gbm.download_neftel_gbm"
  label_strategy: "flat"
  max_genes: 12000
  fate_categories:
